name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-turn-worker:
    runs-on: ubuntu-latest
    outputs:
      turn_credentials_endpoint: ${{ steps['worker-url'].outputs.turn_credentials_endpoint }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Validate Cloudflare Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          CF_TURN_KEY_ID: ${{ secrets.CF_TURN_KEY_ID }}
          CF_TURN_API_TOKEN: ${{ secrets.CF_TURN_API_TOKEN }}
        run: |
          required=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            CF_WORKER_NAME
            FIREBASE_PROJECT_ID
            CF_TURN_KEY_ID
            CF_TURN_API_TOKEN
          )

          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Write wrangler.toml
        working-directory: workers
        env:
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          CF_TURN_KEY_ID: ${{ secrets.CF_TURN_KEY_ID }}
          CF_TURN_TTL_SECONDS: ${{ secrets.CF_TURN_TTL_SECONDS }}
          ALLOWED_UIDS: ${{ secrets.ALLOWED_UIDS }}
        run: |
          ttl="${CF_TURN_TTL_SECONDS:-600}"

          cat > wrangler.toml <<EOF
          name = "${CF_WORKER_NAME}"
          main = "turn-credentials-worker.js"
          compatibility_date = "2026-03-25"

          [vars]
          FIREBASE_PROJECT_ID = "${FIREBASE_PROJECT_ID}"
          CF_TURN_KEY_ID = "${CF_TURN_KEY_ID}"
          CF_TURN_TTL_SECONDS = "${ttl}"
          EOF

          if [ -n "${ALLOWED_UIDS}" ]; then
            echo "ALLOWED_UIDS = \"${ALLOWED_UIDS}\"" >> wrangler.toml
          fi

      - name: Upsert Worker runtime secret (CF_TURN_API_TOKEN)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_TURN_API_TOKEN: ${{ secrets.CF_TURN_API_TOKEN }}
        run: |
          printf '%s' "$CF_TURN_API_TOKEN" | \
            wrangler secret put CF_TURN_API_TOKEN --config workers/wrangler.toml

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler deploy --config workers/wrangler.toml

      - name: Resolve deployed Worker URL
        id: worker-url
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
        run: |
          subdomain=$(
            curl -fsSL \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
              | node -e "let s='';process.stdin.on('data',c=>s+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(s);process.stdout.write((j.result&&j.result.subdomain)||'')}catch{process.stdout.write('')}})"
          )

          if [ -z "$subdomain" ]; then
            echo "Failed to resolve workers.dev subdomain." >&2
            exit 1
          fi

          endpoint="https://${CF_WORKER_NAME}.${subdomain}.workers.dev"
          echo "turn_credentials_endpoint=${endpoint}" >> "$GITHUB_OUTPUT"
          echo "Resolved TURN endpoint: ${endpoint}"

  build-apk:
    needs: deploy-turn-worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Prepare runtime env
        run: |
          if [ -z "${{ secrets.GOOGLE_WEB_CLIENT_ID }}" ]; then
            echo "Missing required secret: GOOGLE_WEB_CLIENT_ID" >&2
            exit 1
          fi
          if [ -z "${{ needs['deploy-turn-worker'].outputs.turn_credentials_endpoint }}" ]; then
            echo "Missing TURN endpoint from deploy-turn-worker output" >&2
            exit 1
          fi

          cat > .env <<EOF
          GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          TURN_CREDENTIALS_ENDPOINT=${{ needs['deploy-turn-worker'].outputs.turn_credentials_endpoint }}
          TURN_URL=${{ secrets.TURN_URL }}
          TURN_USERNAME=${{ secrets.TURN_USERNAME }}
          TURN_CREDENTIAL=${{ secrets.TURN_CREDENTIAL }}
          EOF

      - name: Write google-services.json
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "Missing required secret: GOOGLE_SERVICES_JSON" >&2
            exit 1
          fi

          cat > android/app/google-services.json <<EOF
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF

      - name: Prepare release keystore
        run: |
          if [ -z "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" ]; then
            echo "Missing required secret: ANDROID_UPLOAD_KEYSTORE_BASE64" >&2
            exit 1
          fi
          if [ -z "${{ secrets.AI_VISION_UPLOAD_STORE_PASSWORD }}" ]; then
            echo "Missing required secret: AI_VISION_UPLOAD_STORE_PASSWORD" >&2
            exit 1
          fi
          if [ -z "${{ secrets.AI_VISION_UPLOAD_KEY_ALIAS }}" ]; then
            echo "Missing required secret: AI_VISION_UPLOAD_KEY_ALIAS" >&2
            exit 1
          fi
          if [ -z "${{ secrets.AI_VISION_UPLOAD_KEY_PASSWORD }}" ]; then
            echo "Missing required secret: AI_VISION_UPLOAD_KEY_PASSWORD" >&2
            exit 1
          fi

          echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<EOF
          AI_VISION_UPLOAD_STORE_FILE=upload-keystore.jks
          AI_VISION_UPLOAD_STORE_PASSWORD=${{ secrets.AI_VISION_UPLOAD_STORE_PASSWORD }}
          AI_VISION_UPLOAD_KEY_ALIAS=${{ secrets.AI_VISION_UPLOAD_KEY_ALIAS }}
          AI_VISION_UPLOAD_KEY_PASSWORD=${{ secrets.AI_VISION_UPLOAD_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Prepare Firebase credentials
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "Missing required secret: FIREBASE_SERVICE_ACCOUNT_JSON" >&2
            exit 1
          fi
          if [ -z "${{ secrets.FIREBASE_APP_ID_ANDROID }}" ]; then
            echo "Missing required secret: FIREBASE_APP_ID_ANDROID" >&2
            exit 1
          fi
          if [ -z "${{ secrets.FIREBASE_TESTERS }}" ] && [ -z "${{ secrets.FIREBASE_GROUPS }}" ]; then
            echo "Set at least one of FIREBASE_TESTERS or FIREBASE_GROUPS" >&2
            exit 1
          fi

          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /tmp/firebase-service-account.json

      - name: Distribute APK to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          FIREBASE_TESTERS: ${{ secrets.FIREBASE_TESTERS }}
          FIREBASE_GROUPS: ${{ secrets.FIREBASE_GROUPS }}
        run: |
          args=(
            appdistribution:distribute
            android/app/build/outputs/apk/release/app-release.apk
            --app "$FIREBASE_APP_ID_ANDROID"
            --release-notes "$GITHUB_SHA"
          )

          if [ -n "$FIREBASE_TESTERS" ]; then
            args+=(--testers "$FIREBASE_TESTERS")
          fi

          if [ -n "$FIREBASE_GROUPS" ]; then
            args+=(--groups "$FIREBASE_GROUPS")
          fi

          firebase "${args[@]}"
